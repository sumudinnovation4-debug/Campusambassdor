<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Plug — Ambassador Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #7C3AED; --brand-dark: #5B21B6; --brand-light: #EDE9FE; --brand-xlight: #F5F3FF;
      --accent: #F59E0B; --green: #10B981; --red: #EF4444; --blue: #3B82F6; --orange: #F97316;
      --bg: #0F0D1A; --bg2: #1A1730; --surface: #1E1B2E; --surface2: #252240;
      --border: #2D2A45; --border2: #3D3A58;
      --text: #F0EEFF; --text2: #A8A3C8; --text3: #6B6894;
      --sidebar-w: 240px; --topbar-h: 64px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    button { font-family: 'Inter', sans-serif; cursor: pointer; }
    input, textarea, select { font-family: 'Inter', sans-serif; }
    a { text-decoration: none; color: inherit; }
    #root { display: flex; height: 100%; }

    /* AUTH */
    .auth-screen { width: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 60% 40%, #2D1B69 0%, #0F0D1A 70%); }
    .auth-card { width: 100%; max-width: 420px; padding: 48px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
    .auth-logo { font-size: 26px; font-weight: 800; color: var(--brand); margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--text3); margin-bottom: 36px; }
    .auth-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
    .auth-input { width: 100%; padding: 12px 14px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
    .auth-input:focus { border-color: var(--brand); }
    .auth-btn { width: 100%; padding: 13px; background: var(--brand); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    .auth-btn:hover { background: var(--brand-dark); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-err { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
    .auth-info { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.25); color: #C4B5FD; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; overflow-y: auto; }
    .sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo-text { font-size: 17px; font-weight: 800; color: var(--brand); }
    .sidebar-logo-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .sidebar-section { padding: 12px 12px 4px; }
    .sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
    .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
    .sidebar-user { display: flex; align-items: center; gap: 10px; }
    .sidebar-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--brand); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
    .sidebar-user-name { font-size: 13px; font-weight: 600; }
    .sidebar-user-role { font-size: 11px; color: var(--brand); }
    .logout-btn { margin-left: auto; border: none; background: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 6px; display: flex; align-items: center; }
    .logout-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: var(--topbar-h); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; background: var(--surface); flex-shrink: 0; gap: 16px; }
    .topbar-title { font-size: 18px; font-weight: 700; }
    .topbar-sub { font-size: 13px; color: var(--text3); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-badge { padding: 5px 12px; background: rgba(124,58,237,0.15); color: var(--brand); border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid rgba(124,58,237,0.3); }
    .page { flex: 1; overflow-y: auto; padding: 28px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.purple::before { background: var(--brand); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.amber::before { background: var(--accent); }
    .stat-card.red::before { background: var(--red); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 14px; }
    .stat-icon.purple { background: rgba(124,58,237,0.15); }
    .stat-icon.green { background: rgba(16,185,129,0.15); }
    .stat-icon.amber { background: rgba(245,158,11,0.15); }
    .stat-icon.red { background: rgba(239,68,68,0.15); }
    .stat-icon.blue { background: rgba(59,130,246,0.15); }
    .stat-num { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12.5px; color: var(--text2); font-weight: 500; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .card-title { font-size: 15px; font-weight: 700; }
    .card-count { font-size: 12px; color: var(--text3); background: var(--surface2); padding: 3px 10px; border-radius: 20px; }
    .card-actions { margin-left: auto; display: flex; gap: 8px; }

    /* TABLES */
    table { width: 100%; border-collapse: collapse; }
    th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    td { padding: 13px 16px; font-size: 13.5px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .btn-warn { background: rgba(245,158,11,0.15); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }
    .btn-success { background: rgba(16,185,129,0.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
    .btn-success:hover { background: rgba(16,185,129,0.25); }
    .btn-blue { background: rgba(59,130,246,0.15); color: #93C5FD; border: 1px solid rgba(59,130,246,0.3); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-lg { padding: 11px 22px; font-size: 14px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-verified { background: rgba(16,185,129,0.2); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
    .badge-pending { background: rgba(245,158,11,0.2); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }
    .badge-rejected { background: rgba(239,68,68,0.2); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .badge-paid { background: rgba(16,185,129,0.2); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
    .badge-flagged { background: rgba(239,68,68,0.2); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .badge-purple { background: rgba(124,58,237,0.15); color: #C4B5FD; border: 1px solid rgba(124,58,237,0.3); }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .form-input, .form-textarea, .form-select { width: 100%; padding: 11px 14px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--brand); }
    .form-textarea { resize: none; min-height: 80px; }
    .form-select option { background: var(--surface); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-hint { font-size: 11px; color: var(--text3); margin-top: 5px; }

    /* MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 40px 100px rgba(0,0,0,0.6); animation: modalIn 0.2s ease; }
    @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: none; } }
    .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--surface2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px 24px; }
    .modal-footer { padding: 0 24px 24px; display: flex; gap: 10px; justify-content: flex-end; }

    /* TOAST */
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 16px; border-radius: 10px; font-size: 13.5px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.4); animation: toastIn 0.3s ease; max-width: 320px; }
    @keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }
    .toast-success { background: #065F46; color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
    .toast-error { background: #7F1D1D; color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .toast-info { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }

    /* LOADER */
    .loader { display: flex; align-items: center; justify-content: center; padding: 48px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MISC */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .empty { text-align: center; padding: 60px 24px; color: var(--text3); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .filter-select { padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
    .search-box { padding: 8px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; width: 220px; }
    .search-box:focus { border-color: var(--brand); }
    .search-box::placeholder { color: var(--text3); }

    /* PROGRESS BAR */
    .progress-wrap { background: var(--surface2); border-radius: 6px; height: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--brand), var(--green)); transition: width 0.6s ease; }

    /* REFERRAL CARD */
    .ref-card { background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(59,130,246,0.15)); border: 1px solid rgba(124,58,237,0.35); border-radius: 14px; padding: 20px 24px; }
    .ref-code { font-size: 22px; font-weight: 800; color: var(--brand); letter-spacing: 1px; font-family: monospace; }
    .ref-link-box { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-top: 10px; }
    .ref-link-text { font-size: 13px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ANNOUNCEMENT */
    .announcement-banner { background: linear-gradient(90deg, rgba(124,58,237,0.15), rgba(59,130,246,0.1)); border: 1px solid rgba(124,58,237,0.3); border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-start; }

    /* CHAT */
    .chat-messages { height: 340px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .chat-msg { max-width: 80%; }
    .chat-msg.mine { align-self: flex-end; }
    .chat-msg.theirs { align-self: flex-start; }
    .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13.5px; line-height: 1.5; }
    .chat-msg.mine .chat-bubble { background: var(--brand); color: white; border-bottom-right-radius: 4px; }
    .chat-msg.theirs .chat-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
    .chat-time { font-size: 10px; color: var(--text3); margin-top: 3px; text-align: right; }
    .chat-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
    .chat-input { flex: 1; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }
    .chat-input:focus { border-color: var(--brand); }

    /* EQUITY */
    .equity-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
    .equity-bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .equity-bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .equity-bar-fill { height: 100%; border-radius: 4px; background: var(--brand); }

    /* TABS */
    .page-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
    .page-tab { padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; border: none; background: none; transition: all 0.15s; }
    .page-tab.active { background: var(--brand); color: white; }

    /* MOBILE */
    @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="root"></div>
<div id="modal-root"></div>

<script>
// ========================================================
// CONFIG
// ========================================================
const SUPABASE_URL = 'https://zgzamthhfykhjaldosvb.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_T2qRKGsS33YJPN3BochPTA_r2v_gSlS'

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ========================================================
// UTILS
// ========================================================
function toast(msg, type = 'info') {
  const el = document.createElement('div')
  el.className = `toast toast-${type}`
  el.textContent = msg
  document.getElementById('toast-container').appendChild(el)
  setTimeout(() => el.remove(), 3500)
}
function fmtDate(ts) {
  if (!ts) return '—'
  return new Date(ts).toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' })
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - new Date(ts)) / 1000)
  if (s < 60) return `${s}s ago`
  if (s < 3600) return `${Math.floor(s/60)}m ago`
  if (s < 86400) return `${Math.floor(s/3600)}h ago`
  return `${Math.floor(s/86400)}d ago`
}
function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()
}
function numFmt(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k'
  return String(n || 0)
}
function naira(n) { return '₦' + Number(n||0).toLocaleString() }
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copied!', 'success')).catch(() => toast('Copy failed', 'error'))
}
function closeModal() {
  const el = document.getElementById('modal-root')
  if (el) el.innerHTML = ''
}

// ========================================================
// STATE
// ========================================================
let state = {
  user: null, ambassador: null,
  page: 'overview',
  referrals: [], payouts: [],
  messages: [], announcements: [],
  refFilter: 'all', refSearch: '',
  chatPoll: null,
}

// ========================================================
// AUTH
// ========================================================
async function checkAuth() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { renderAuth(); return }
  state.user = session.user
  await loadAmbassador()
}

async function loadAmbassador() {
  const { data, error } = await db.from('ambassadors')
    .select('*')
    .eq('user_id', state.user.id)
    .single()
  
  if (error || !data) {
    renderPendingAccess()
    return
  }

  if (data.status === 'pending') { renderPendingAccess(); return }
  if (data.status === 'rejected') { renderRejected(data); return }
  if (data.status !== 'approved') { renderPendingAccess(); return }

  state.ambassador = data

  // First login: force profile completion
  if (!data.profile_complete) {
    renderOnboarding()
    return
  }

  renderApp()
  loadDashboardData()
}

async function login(email, password) {
  const { data, error } = await db.auth.signInWithPassword({ email, password })
  if (error) return error.message
  state.user = data.user
  await loadAmbassador()
  return null
}

async function logout() {
  if (state.chatPoll) clearInterval(state.chatPoll)
  await db.auth.signOut()
  state.user = null; state.ambassador = null
  renderAuth()
}

// ========================================================
// AUTH SCREENS
// ========================================================
function renderAuth() {
  document.getElementById('root').innerHTML = `
  <div class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">⚡ Campus Plug</div>
      <div class="auth-sub">Ambassador Portal — Invite-Only Access</div>
      <div id="auth-err"></div>
      <div class="auth-info">🔐 Access is granted by Campus Plug admin only. No self-signup.</div>
      <label class="auth-label">Email Address</label>
      <input class="auth-input" type="email" id="auth-email" placeholder="your@email.com" autocomplete="username">
      <label class="auth-label">Password</label>
      <input class="auth-input" type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
      <button class="auth-btn" id="auth-btn" onclick="doLogin()">Sign In to Ambassador Portal</button>
    </div>
  </div>`
}

function renderPendingAccess() {
  document.getElementById('root').innerHTML = `
  <div class="auth-screen">
    <div class="auth-card" style="text-align:center">

async function submitOnboarding() {
  const phone = document.getElementById('ob-phone').value.trim()
  const whatsapp = document.getElementById('ob-whatsapp').value.trim()
  const school = document.getElementById('ob-school').value.trim()
  const dept = document.getElementById('ob-dept').value.trim()
  const level = document.getElementById('ob-level').value
  const errEl = document.getElementById('onboard-err')
  errEl.innerHTML = ''

  if (!phone || !whatsapp || !school || !dept || !level) {
    errEl.innerHTML = `<div class="auth-err">Please fill in all fields.</div>`; return
  }

  const btn = document.getElementById('ob-btn')
  btn.disabled = true; btn.textContent = 'Saving...'

  // Generate unique 6-character referral code e.g. X7K2QP
  // Keeps generating until it finds one not already in use
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'  // no 0/O/1/I to avoid confusion
  let referral_code = ''
  let attempts = 0
  while (attempts < 10) {
    const candidate = Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('')
    const { data: existing } = await db.from('ambassadors').select('id').eq('referral_code', candidate).maybeSingle()
    if (!existing) { referral_code = candidate; break }
    attempts++
  }
  if (!referral_code) referral_code = Date.now().toString(36).toUpperCase().slice(-6)
  const referral_link = `https://campus-plug-app.vercel.app/ref/${referral_code}`

  const { error } = await db.from('ambassadors').update({
    phone, whatsapp, school, department: dept, level,
    referral_code, referral_link,
    profile_complete: true,
    updated_at: new Date().toISOString()
  }).eq('user_id', state.user.id)

  if (error) {
    errEl.innerHTML = `<div class="auth-err">${error.message}</div>`
    btn.disabled = false; btn.textContent = 'Activate My Ambassador Account →'
    return
  }

  toast('🎉 Profile complete! Welcome aboard.', 'success')
  await loadAmbassador()
}

// ========================================================
function computeStats() {
  const refs = state.referrals
  const total = refs.length
  const verified = refs.filter(r => r.status === 'verified').length
  const pending = refs.filter(r => r.status === 'pending').length

  // Option A: ₦3k per 5 verified students
  const earningsA = Math.floor(verified / 5) * 3000
  // Monthly (this month)
  const now = new Date()
  const thisMonthVerified = refs.filter(r => {
    const d = new Date(r.verified_at || r.created_at)
    return r.status === 'verified' && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()
  }).length
  const monthEarnings = Math.floor(thisMonthVerified / 5) * 3000

  const pendingEarnings = refs.filter(r => r.status === 'pending').length * 600 // estimated

  return { total, verified, pending, earningsA, monthEarnings, pendingEarnings }
}

function exportCSV() {
  const rows = [['Name','Email','School','Date','Status','Earnings']]
  state.referrals.forEach(r => {
    rows.push([r.student_name||'', r.student_email||'', r.student_school||'', fmtDate(r.created_at), r.status, r.status==='verified'?'600':'0'])
  })
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n')
  const blob = new Blob([csv], { type: 'text/csv' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a'); a.href = url; a.download = `referrals-${state.ambassador.referral_code}.csv`; a.click()
  toast('CSV downloaded', 'success')
}

      <div class="stat-card green"><div class="stat-icon green">✅</div><div class="stat-num">${naira(verifiedEarnings)}</div><div class="stat-label">Verified Earnings</div></div>
      <div class="stat-card amber"><div class="stat-icon amber">⏳</div><div class="stat-num">${naira(pendingPayable)}</div><div class="stat-label">Pending Earnings</div></div>

      <div class="stat-card purple"><div class="stat-icon purple">💰</div><div class="stat-num">${naira(verifiedEarnings - totalPaid)}</div><div class="stat-label">Available Balance</div></div>

            <div style="font-size:13px;color:var(--text2)">₦3,000 for every 5 verified students you refer.</div>
            <div style="font-size:12px;color:var(--text3);margin-top:4px">You have ${s.verified} verified → ${naira(Math.floor(s.verified/5)*3000)}</div>
          </div>
          <div style="padding:14px;background:var(--bg2);border-radius:10px;border-left:3px solid var(--green)">
            <div style="font-weight:700;font-size:14px;margin-bottom:6px">Option B — Monthly Tier</div>
            <div style="font-size:13px;color:var(--text2)">Earn ₦50,000 when you refer 30+ verified students in a calendar month.</div>
            <div style="font-size:12px;color:var(--red);margin-top:4px">⚠️ Only verified students count for payouts</div>

          <div class="form-group">

            <input class="form-input" id="pay-acct" placeholder="0123456789" value="${state.ambassador.account_number||''}">

            ? `<div style="font-size:12px;color:var(--accent);padding:10px 14px;background:rgba(245,158,11,0.1);border-radius:8px;margin-bottom:12px">⚠️ Minimum payout is ₦5,000. Earn more first!</div>`
            : ''}
          <button class="btn btn-primary btn-full" onclick="requestPayout(${verifiedEarnings - totalPaid})" ${(verifiedEarnings - totalPaid) < 5000 ? 'disabled' : ''}>

          </button>
        </div>

    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Payout History</span><span class="card-count">${state.payouts.length}</span></div>
      ${!state.payouts.length
        ? '<div class="empty"><div class="empty-icon">💳</div><div class="empty-title">No payouts yet</div></div>'
        : `<div style="overflow-x:auto"><table>
            <thead><tr><th>Amount</th><th>Bank</th><th>Date</th><th>Status</th><th>Ref</th></tr></thead>

              ${state.payouts.map(p => `<tr>
                <td style="font-weight:700;color:var(--green)">${naira(p.amount)}</td>
                <td style="font-size:13px;color:var(--text2)">${p.bank_name||'—'} · ${p.account_number||'—'}</td>

async function requestPayout(available) {
  if (available < 5000) { toast('Minimum payout is ₦5,000', 'error'); return }
  const bank = document.getElementById('pay-bank')?.value.trim()
  const acct = document.getElementById('pay-acct')?.value.trim()
  if (!bank || !acct) { toast('Enter bank details first', 'error'); return }

  // Save bank details
  await db.from('ambassadors').update({ bank_name: bank, account_number: acct }).eq('id', state.ambassador.id)

  const { error } = await db.from('ambassador_payouts').insert({
    ambassador_id: state.ambassador.id,
    amount: available,
    bank_name: bank,
    account_number: acct,
    status: 'pending',
    created_at: new Date().toISOString()
  })
  if (error) { toast('Request failed: ' + error.message, 'error'); return }
  toast('✅ Payout request submitted! Admin will review within 48hrs.', 'success')
  loadPayouts()
}

// ========================================================
// EQUITY TRACKER
// ========================================================
async function renderEquity() {
  const pc = document.getElementById('page-content')
  if (!pc) return
  pc.innerHTML = '<div class="loader"><div class="spinner"></div></div>'

  // Load all ambassadors to compute pool share
  const { data: allAmbs } = await db.from('ambassadors').select('id, full_name, school, referral_code').eq('status', 'approved')
  const { data: allRefs } = await db.from('ambassador_referrals').select('ambassador_id, status')

  const verifiedByAmb = {}
  if (allRefs) allRefs.filter(r => r.status === 'verified').forEach(r => {
    verifiedByAmb[r.ambassador_id] = (verifiedByAmb[r.ambassador_id] || 0) + 1
  })
  const totalPool = Object.values(verifiedByAmb).reduce((a,b) => a+b, 0)
  const myVerified = verifiedByAmb[state.ambassador.id] || 0
  const myShare = totalPool > 0 ? (myVerified / totalPool * 5).toFixed(3) : '0.000'

  // Cliff / vest
  const startDate = new Date(state.ambassador.created_at)
  const now = new Date()
  const monthsActive = Math.floor((now - startDate) / (30 * 86400 * 1000))
  const cliffMonths = 6
  const vestMonths = 24
  const cliffLeft = Math.max(0, cliffMonths - monthsActive)
  const vestPct = Math.min(100, Math.max(0, Math.round((monthsActive - cliffMonths) / vestMonths * 100)))

  const topAmbs = (allAmbs || [])
    .map(a => ({ ...a, verified: verifiedByAmb[a.id] || 0, pct: totalPool > 0 ? (verifiedByAmb[a.id]||0) / totalPool * 5 : 0 }))
    .sort((a, b) => b.verified - a.verified)
    .slice(0, 5)

  pc.innerHTML = `
    <div class="two-col" style="margin-bottom:20px">
      <div class="equity-card">
        <div style="font-size:13px;color:var(--text3);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Your Equity Stake</div>
        <div style="font-size:42px;font-weight:800;color:var(--brand)">${myShare}%</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">of the 5% ambassador equity pool</div>
        <div style="margin-top:16px;padding:14px;background:var(--bg2);border-radius:10px;font-size:13px;color:var(--text2)">
          Based on: <strong style="color:var(--text)">${myVerified} verified students</strong> out of ${totalPool} pool total
        </div>
      </div>

      <div class="equity-card">
        <div style="font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px">Vesting Schedule</div>
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:13px;font-weight:600">6-Month Cliff</span>
            <span style="font-size:13px;color:${cliffLeft===0?'var(--green)':'var(--accent)'};">${cliffLeft===0?'✅ Cliff Passed':`${cliffLeft} months left`}</span>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:13px;font-weight:600">24-Month Vest</span>
            <span style="font-size:13px;color:var(--brand)">${vestPct}% vested</span>
          </div>
          <div class="progress-wrap"><div class="progress-fill" style="width:${vestPct}%"></div></div>
          <div style="font-size:12px;color:var(--text3);margin-top:8px">
            ${cliffLeft > 0 ? `Your equity vesting starts after ${cliffLeft} more month${cliffLeft===1?'':'s'}.` : `You've vested ${vestPct}% of your equity stake.`}
          </div>
        </div>
        <div style="margin-top:16px;font-size:12px;color:var(--text3);padding:10px;background:var(--bg2);border-radius:8px;line-height:1.6">
          📅 Started: ${fmtDate(state.ambassador.created_at)}<br>
          🏁 Full vest by: ${fmtDate(new Date(startDate.getTime() + (6+24)*30*86400*1000).toISOString())}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">🏆 Top Ambassadors — Pool Breakdown</span></div>
      <div style="padding:20px">
        ${topAmbs.map((a, i) => `
          <div class="equity-bar-item">
            <div style="width:20px;font-size:12px;color:var(--text3);font-weight:700">${i+1}</div>
            <div style="min-width:140px;font-size:13px;font-weight:600;${a.id===state.ambassador.id?'color:var(--brand)':''}">${a.full_name||a.referral_code} ${a.id===state.ambassador.id?'(You)':''}</div>
            <div class="equity-bar-track"><div class="equity-bar-fill" style="width:${Math.min(100,a.pct*20)}%"></div></div>
            <div style="min-width:60px;font-size:12px;font-weight:700;color:var(--brand);text-align:right">${a.pct.toFixed(3)}%</div>
          </div>`).join('')}
      </div>
    </div>`
}

async function markPrinted(materialId, printed) {
  await db.from('ambassador_materials').update({ printed }).eq('id', materialId)
  toast(printed ? 'Marked as printed' : 'Unmarked', 'info')
}

async function markMerchReceived(merchId) {
  const { error } = await db.from('ambassador_merch').update({ received: true, received_at: new Date().toISOString() }).eq('id', merchId)
  if (error) { toast('Update failed', 'error'); return }
  toast('✅ Item marked as received', 'success')
  renderMaterials()
}

}

function renderChatMessages() {
  const el = document.getElementById('chat-messages')
  if (!el) return
  if (!state.messages.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">No messages yet. Say hello! 👋</div>'
    return
  }
  el.innerHTML = state.messages.map(m => {
    const isMine = m.sender === 'ambassador'
    return `<div class="chat-msg ${isMine?'mine':'theirs'}">
      <div class="chat-bubble">${m.body}</div>
      <div class="chat-time">${timeAgo(m.created_at)} ${isMine?'· You':'· Admin'}</div>
    </div>`
  }).join('')
  el.scrollTop = el.scrollHeight
}

async function sendMessage() {
  const input = document.getElementById('chat-input')
  const body = input?.value.trim()
  if (!body) return
  input.value = ''

  const { error } = await db.from('ambassador_messages').insert({
    ambassador_id: state.ambassador.id,
    sender: 'ambassador',
    body,
    created_at: new Date().toISOString()
  })
  if (error) { toast('Failed to send', 'error'); return }
  await loadMessages()
}

function openCustomCodeModal() {
  const a = state.ambassador
  const el = document.getElementById('modal-root')
  el.innerHTML = `
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <span class="modal-title">✏️ Set Custom Referral Code</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">
          Set a short, memorable 6-character code people can type manually (e.g. <strong>FATIMA</strong> or <strong>KANO06</strong>).<br><br>
          Both your auto code <strong style="color:var(--brand)">${a.referral_code}</strong> and your custom code will work — students can use either one.
        </div>
        <div class="form-group">
          <label class="form-label">Custom Code</label>
          <input class="form-input" id="custom-code-input" placeholder="e.g. FATIMA"
            value="${a.custom_code||''}"
            maxlength="6"
            oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6)"
            style="font-family:monospace;font-size:16px;font-weight:700;letter-spacing:1px">
          <div class="form-hint">Letters and numbers only. Must be exactly 6 characters. No spaces or hyphens.</div>
        </div>
        <div id="custom-code-preview" style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--text2)">
          Link preview: <span id="cc-preview-text" style="color:var(--brand);font-weight:600">https://campus-plug-app.vercel.app/ref/</span>
        </div>
      </div>
      <div id="custom-code-err"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCustomCode()">Save Custom Code</button>
      </div>
    </div>
  </div>`

  // Live preview
  document.getElementById('custom-code-input').addEventListener('input', function() {
    const val = this.value
    document.getElementById('cc-preview-text').textContent =
      `https://campus-plug-app.vercel.app/ref/${val || '...'}`
  })
}

async function saveCustomCode() {
  const raw = document.getElementById('custom-code-input').value.trim().toUpperCase()
  const errEl = document.getElementById('custom-code-err')
  errEl.innerHTML = ''

  if (!raw) { errEl.innerHTML = `<div style="padding:0 24px 12px"><div class="auth-err">Enter a code first.</div></div>`; return }
  if (raw.length !== 6) { errEl.innerHTML = `<div style="padding:0 24px 12px"><div class="auth-err">Code must be exactly 6 characters.</div></div>`; return }

  // Check if code is already taken by another ambassador
  const { data: existing } = await db.from('ambassadors')
    .select('id')
    .or(`referral_code.eq.${raw},custom_code.eq.${raw}`)
    .neq('id', state.ambassador.id)
    .single()

  if (existing) {
    errEl.innerHTML = `<div style="padding:0 24px 12px"><div class="auth-err">❌ That code is already taken. Try a different one.</div></div>`
    return
  }

  const { error } = await db.from('ambassadors').update({
    custom_code: raw,
    updated_at: new Date().toISOString()
  }).eq('id', state.ambassador.id)

  if (error) { errEl.innerHTML = `<div style="padding:0 24px 12px"><div class="auth-err">${error.message}</div></div>`; return }

  toast(`✅ Custom code set: ${raw}`, 'success')
  state.ambassador.custom_code = raw
  closeModal()
  renderOverview()
}
function shareWhatsApp() {
  const a = state.ambassador
  const codeLines = a.custom_code
    ? `🔑 Referral Code: *${a.referral_code}*\n✨ Or use my custom code: *${a.custom_code}*`
    : `🔑 Referral Code: *${a.referral_code}*`
  const text = encodeURIComponent(
    `Hey! Join Campus Plug — Nigeria's biggest student marketplace 🎓\n\n` +
    `👉 Sign up here: ${a.referral_link}\n\n` +
    `${codeLines}\n\n` +
    `Enter the code when signing up so we're linked! ✅`
  )
  window.open(`https://wa.me/?text=${text}`, '_blank')
}
